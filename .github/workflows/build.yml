name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            yt-dlp-asset: yt-dlp.exe
            sidecar-name: yt-dlp-x86_64-pc-windows-msvc.exe
          - os: macos-14
            target: aarch64-apple-darwin
            yt-dlp-asset: yt-dlp_macos
            sidecar-name: yt-dlp-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Download yt-dlp sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.yt-dlp-asset }}" \
            -o "src-tauri/binaries/${{ matrix.sidecar-name }}"
          chmod +x "src-tauri/binaries/${{ matrix.sidecar-name }}"

      - name: Download yt-dlp sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.yt-dlp-asset }}" `
            -OutFile "src-tauri/binaries/${{ matrix.sidecar-name }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "arane-archive ${{ github.ref_name }}"
          releaseBody: |
            ## 아라네 아카이브 ${{ github.ref_name }}

            아라네의 소중한 영상들을 보관해 드립니다 🍒

            ---

            ### 기능
            - 아라네 영상 목록 전체 제공 (썸네일·날짜·길이 표시)
            - 영상 개별/전체 선택 후 일괄 다운로드
            - 이미 받은 영상은 팝콘 버튼으로 바로 재생
            - yt-dlp 인앱 업데이트 지원

            ---

            ### 사용법
            1. **저장 경로** 폴더를 선택합니다
            2. **브라우저**를 선택하고, 해당 브라우저에서 YouTube에 로그인합니다
               - macOS: Safari / Chrome / Firefox 중 선택
               - Windows: **브라우저를 완전히 닫은 후** 다운로드하세요
            3. 받고 싶은 영상을 선택합니다
            4. **다운로드** 버튼을 누릅니다

            ---

            ### 다운로드
            - **macOS (Apple Silicon)**: `arane-archive_x.x.x_aarch64.dmg`
            - **Windows (64비트)**: `arane-archive_x.x.x_x64-setup.exe`

            ### 설치 시 주의사항
            - **macOS**: 보안 경고 시 `시스템 설정 > 개인정보 보호 및 보안`에서 허용해주세요
            - **Windows**: "알 수 없는 게시자" 경고 시 `추가 정보 > 실행`을 클릭해주세요
          releaseDraft: false
          prerelease: false
